name: build-release

# Build the Windows installer on a real Windows runner (the NDI native module
# `grandiose` compiles per-OS, so a Windows .exe cannot be cross-built on macOS)
# and attach it to the GitHub Release for the pushed tag. The macOS .dmg/.zip are
# built locally and uploaded to the same release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    # Pin to windows-2022 (Visual Studio 2022). windows-latest ships VS 2026 (v18)
    # which grandiose's bundled node-gyp 9.4.1 can't detect → native build fails.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # grandiose's bundled node-gyp 9.4.1 crashes under Python 3.12 (the runner
      # default). Pin Python 3.11 so the native gyp build works.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci
        env:
          GYP_MSVS_VERSION: 2022
          PYTHON: python

      - name: Build Windows app
        run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Upload the built installer + zip straight onto the v1.0.0 release. (Doing
      # it here rather than via electron-builder's own publisher avoids its
      # draft-vs-release conflict when the release already exists.)
      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'v1.0.0' }}
          files: |
            release/*.exe
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
