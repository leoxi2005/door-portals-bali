<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>DOOR PORTALS</title>
  <style>
    html, body {
      margin: 0; padding: 0; background: #000; overflow: hidden;
      width: 100%; height: 100%;
    }
    #stage {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    canvas#gl {
      max-width: 100%; max-height: 100%;
      aspect-ratio: 9335 / 1080;
      cursor: crosshair;
    }
    #hud {
      position: fixed; top: 10px; left: 12px;
      font: 11px/1.6 "SF Mono", Menlo, monospace;
      color: #9fd8ff; background: rgba(0, 8, 20, 0.55);
      padding: 8px 12px; border-radius: 8px;
      pointer-events: none; white-space: pre;
      z-index: 10;
    }
    #hud.hidden { display: none; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "./node_modules/three/build/three.module.js",
      "three/addons/": "./node_modules/three/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="stage"><canvas id="gl"></canvas></div>
  <div id="hud">DOOR PORTALS — loading…</div>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
