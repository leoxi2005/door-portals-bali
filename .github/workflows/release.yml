name: build-release

# Build the Windows installer on a real Windows runner (the NDI native module
# `grandiose` compiles per-OS, so a Windows .exe cannot be cross-built on macOS)
# and attach it to the GitHub Release for the pushed tag. The macOS .dmg/.zip are
# built locally and uploaded to the same release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app + publish to the release
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Fallback: if publish didn't attach (e.g. release not found), upload the
      # built artifacts to the tag's release directly.
      - name: Upload artifacts to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
